<title>Radar Segmentation Research Progress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --paper:#eef1f5; --panel:#ffffff; --ink:#0f1824; --ink2:#2b3a4b; --muted:#657688; --hair:#d8e0e9;
  --accent:#14479a; --accent2:#1f66c9; --best:#c2680c; --best-bg:rgba(194,104,12,.10); --grid:#e4e9f0;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --sans:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"Cascadia Code","Segoe UI Mono",Consolas,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#0a0f17; --panel:#111a26; --ink:#e9eff6; --ink2:#c2ceda; --muted:#8195a9; --hair:#1e2a3a;
  --accent:#5aa0ea; --accent2:#78b4f2; --best:#e59a45; --best-bg:rgba(229,154,69,.12); --grid:#1a2534;}}
:root[data-theme="dark"]{
  --paper:#0a0f17; --panel:#111a26; --ink:#e9eff6; --ink2:#c2ceda; --muted:#8195a9; --hair:#1e2a3a;
  --accent:#5aa0ea; --accent2:#78b4f2; --best:#e59a45; --best-bg:rgba(229,154,69,.12); --grid:#1a2534;}
:root[data-theme="light"]{
  --paper:#eef1f5; --panel:#ffffff; --ink:#0f1824; --ink2:#2b3a4b; --muted:#657688; --hair:#d8e0e9;
  --accent:#14479a; --accent2:#1f66c9; --best:#c2680c; --best-bg:rgba(194,104,12,.10); --grid:#e4e9f0;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:0 24px 90px}
header{position:relative;padding:34px 0 4px;overflow:hidden}
.rings{position:absolute;right:-46px;top:-30px;width:184px;height:184px;opacity:.5;pointer-events:none}
.brand{display:flex;align-items:center;gap:10px}
.scope{width:26px;height:26px;flex:none}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent2)}
h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.14;letter-spacing:-.01em;margin:10px 0 0;max-width:24ch;text-wrap:balance}
.lede{color:var(--ink2);max-width:66ch;margin-top:11px}
.tbtn{position:absolute;right:0;top:34px;font-family:var(--mono);font-size:11.5px;color:var(--muted);background:var(--panel);
  border:1px solid var(--hair);border-radius:7px;padding:7px 10px;cursor:pointer}
.tbtn:hover{color:var(--ink)}

nav.tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--hair);position:sticky;top:0;background:var(--paper);z-index:5;margin-top:22px;padding-top:6px}
.tab{font-family:var(--sans);font-size:14px;color:var(--muted);background:none;border:none;padding:12px 14px 13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab .n{font-family:var(--mono);font-size:11px;margin-right:7px;color:var(--muted)}
.tab:hover{color:var(--ink)}
.tab[aria-selected="true"]{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
.tab[aria-selected="true"] .n{color:var(--accent2)}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:-3px;border-radius:5px}

.panel{display:none;padding-top:26px}
.panel.on{display:block;animation:f .22s ease}
@keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.panel.on{animation:none}}

h2{font-family:var(--serif);font-weight:600;font-size:23px;line-height:1.18;margin:0;letter-spacing:-.01em;text-wrap:balance}
h3{font-size:12px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;font-weight:600}
p{margin:11px 0;max-width:70ch;color:var(--ink2)}
.goalline{font-family:var(--serif);font-size:17px;color:var(--ink);margin:8px 0 2px;max-width:66ch}

.meta{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--hair);border-radius:10px;overflow:hidden;margin:18px 0 4px}
.meta div{padding:12px 15px;border-right:1px solid var(--hair)}
.meta div:last-child{border-right:none}
.meta .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.meta .d{margin-top:4px;font-size:13.5px;color:var(--ink)}
@media(max-width:680px){.meta{grid-template-columns:1fr}.meta div{border-right:none;border-bottom:1px solid var(--hair)}}

figure{margin:14px 0 4px}
.viz{background:var(--panel);border:1px solid var(--hair);border-radius:11px;padding:16px 16px 12px}
.viz svg{display:block;width:100%;height:auto}
figcaption{font-size:12.5px;color:var(--muted);margin-top:9px;max-width:74ch}
.ax{fill:var(--muted);font:400 11px var(--mono)}
.lab{fill:var(--ink);font:600 12.5px var(--sans)}
.lab .sub{fill:var(--muted);font-weight:400}
.val{fill:var(--ink);font:600 12px var(--mono)}
.legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--muted);margin-top:10px;font-family:var(--mono)}
.legend span{display:inline-flex;align-items:center;gap:7px}
.sw{width:11px;height:11px;border-radius:3px;display:inline-block}

.tscroll{overflow-x:auto;border:1px solid var(--hair);border-radius:10px;background:var(--panel);margin-top:4px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:8px 11px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--hair)}
th{font-family:var(--mono);font-weight:500;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:var(--panel);position:sticky;top:0}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--panel)}
td.n{font-family:var(--mono);font-variant-numeric:tabular-nums}
tbody tr:last-child td{border-bottom:none}
tbody tr.best td{background:var(--best-bg)}
tbody tr.best td:first-child{box-shadow:inset 3px 0 0 var(--best)}
.cfg{font-weight:600;color:var(--ink)}
.pill{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--hair);border-radius:5px;padding:1px 5px;margin-left:5px}
.star{color:var(--best);font-weight:700;margin-left:5px}
td.frm{font-family:var(--mono);font-size:11.5px;text-align:left;color:var(--ink);white-space:nowrap}
td.mdef{text-align:left;color:var(--muted)}
.mnote{font-size:12.5px;color:var(--muted);margin-top:12px;max-width:84ch}

ul.k{margin:8px 0;padding:0;list-style:none}
ul.k li{position:relative;padding-left:20px;margin:8px 0;max-width:70ch;color:var(--ink2)}
ul.k li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--accent2)}
.decide{display:flex;gap:13px;align-items:flex-start;background:var(--best-bg);border:1px solid var(--best);border-radius:10px;padding:13px 15px;margin:16px 0}
.decide .tg{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--best);border:1px solid var(--best);border-radius:20px;padding:3px 9px;white-space:nowrap;margin-top:2px}
.decide .b{font-size:14px;color:var(--ink)}
.decide b{font-weight:640}
.next-reason{font-size:14px;color:var(--ink2);border-left:2px solid var(--hair);padding-left:14px;margin-top:14px}
.next-reason b{color:var(--ink)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:680px){.two{grid-template-columns:1fr}}
.deflist{font-size:13.5px}
.deflist div{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--hair)}
.deflist div:last-child{border-bottom:none}
.deflist .t{font-family:var(--mono);font-size:11.5px;color:var(--muted);min-width:96px}
</style>
